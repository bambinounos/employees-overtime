<!DOCTYPE html>
<html lang="es">
<head><meta charset="utf-8"></head>
<body style="margin:0; padding:0; background:#f4f5f7; font-family: Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7; padding: 24px 0;">
    <tr><td align="center">
      <table role="presentation" width="560" cellpadding="0" cellspacing="0"
             style="background:#ffffff; border-radius:8px; overflow:hidden; border:1px solid #e1e4e8;">
        <tr>
          <td style="background:#1e3a5f; color:#ffffff; padding:16px 24px; font-size:18px; font-weight:bold;">
            {% block header %}Gestión de Salarios{% endblock %}
          </td>
        </tr>
        <tr>
          <td style="padding:24px; color:#333333; font-size:14px; line-height:1.6;">
            {% block body %}{% endblock %}
          </td>
        </tr>
        <tr>
          <td style="padding:12px 24px; color:#888888; font-size:11px; border-top:1px solid #eeeeee;">
            Mensaje automático del sistema de gestión de salarios. No respondas a este correo.
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
