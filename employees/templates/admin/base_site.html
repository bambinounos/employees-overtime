{% extends "admin/base.html" %}
{% load static %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}">
        Salary Management Administration
    </a>
    {% if app_version %}<span style="display:inline-block;margin-left:10px;padding:2px 8px;background:rgba(255,255,255,0.18);border-radius:4px;font-size:0.7rem;font-weight:normal;vertical-align:middle;letter-spacing:0.5px;">v{{ app_version }}</span>{% endif %}
</h1>
{% endblock %}

{% block extrahead %}
{{ block.super }}
{% if site_config.favicon %}
    <link rel="icon" href="{{ site_config.favicon.url }}">
{% else %}
    <link rel="icon" type="image/x-icon" href="{% static 'employees/img/favicon.ico' %}">
{% endif %}
{% endblock %}
