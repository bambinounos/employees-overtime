<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#2c3e50" opacity="0.08"/>

  <!-- Bar chart -->
  <rect x="12" y="38" width="8" height="16" rx="2" fill="#3498db"/>
  <rect x="23" y="28" width="8" height="26" rx="2" fill="#2980b9"/>
  <rect x="34" y="20" width="8" height="34" rx="2" fill="#2c3e50"/>
  <rect x="45" y="12" width="8" height="42" rx="2" fill="#27ae60"/>

  <!-- Growth arrow -->
  <polyline points="14,36 25,26 36,18 49,10"
            fill="none" stroke="#e74c3c" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="49,10 43,11 47,15" fill="#e74c3c"/>

  <!-- Dollar sign on tallest bar -->
  <text x="49" y="38" font-family="Arial,sans-serif" font-size="11"
        font-weight="bold" fill="white" text-anchor="middle">$</text>

  <!-- Connection dots (webhook/sync) -->
  <circle cx="14" cy="58" r="2" fill="#3498db"/>
  <circle cx="22" cy="58" r="2" fill="#2980b9"/>
  <circle cx="30" cy="58" r="2" fill="#2c3e50"/>
  <line x1="16" y1="58" x2="20" y2="58" stroke="#95a5a6" stroke-width="1.5"/>
  <line x1="24" y1="58" x2="28" y2="58" stroke="#95a5a6" stroke-width="1.5"/>
</svg>
